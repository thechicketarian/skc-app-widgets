<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting XI Widget</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      overflow: hidden; /* prevents internal scroll */
    }
  </style>
</head>

<body>
  <div id="starting-eleven"></div>

  <!-- Load your widget script -->
  <script type="module" src="/starting-eleven/starting-eleven.js"></script>

  <!-- Auto-resize messaging -->
  <script>
    function sendHeight() {
      const height = document.body.scrollHeight;
      parent.postMessage({ type: "starting-eleven-height", height }, "*");
    }

    window.onload = sendHeight;
    window.onresize = sendHeight;

    // Also send height after fonts load
    document.fonts?.ready?.then(sendHeight);
  </script>
</body>
</html>
